name: CE Stock Scanner

on:
  schedule:
    - cron: "0 * * * *" # Every Hour
  push:
    branches:
      - main # On push to main branch
  workflow_dispatch: # Run Manually with workflow dispatch
 
jobs:
  Schedule:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy pytz

      - name: Run CE Scanner
        run: python ce_scanner_working.py

      - name: Commit docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "CE Scanner update — ${{ github.run_number }}"
          git push origin main
          
