name: CE Scanner

on:
  schedule:
    # IST = UTC+5:30, so:
    # 10:00 AM IST = 04:30 UTC
    # 02:00 PM IST = 08:30 UTC
    # 04:00 PM IST = 10:30 UTC
    - cron: '30 4 * * 1-5'    # 10:00 AM IST  Mon-Fri
    - cron: '30 8 * * 1-5'    # 02:00 PM IST  Mon-Fri
    - cron: '30 10 * * 1-5'   # 04:00 PM IST  Mon-Fri

  # Manual run button bhi hoga GitHub pe
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy pytz

      - name: Run CE Scanner
        run: python ce_scanner_working.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "CE Scanner update — ${{ github.run_number }}"
